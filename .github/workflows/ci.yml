name: Django CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - release
  pull_request:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Docker Compose 설치
      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      # 3. 환경 변수 설정
      - name: Export environment variables
        run: |
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> $GITHUB_ENV
          echo "DB_USER=${{ secrets.DB_USER }}" >> $GITHUB_ENV
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> $GITHUB_ENV
          echo "DB_HOST=postgresql" >> $GITHUB_ENV
          echo "DB_PORT=5432" >> $GITHUB_ENV
          echo "REDIS_HOST=redis" >> $GITHUB_ENV
          echo "REDIS_PORT=6379" >> $GITHUB_ENV

      # 4. Docker Compose 빌드 및 테스트
      - name: Build and Test with Docker
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: postgresql
          DB_PORT: 5432
          REDIS_HOST: redis
          REDIS_PORT: 6379
        run: |
          docker-compose -f docker-compose-common.yml -f docker-compose-blue.yml down --volumes --remove-orphans || true
          docker-compose -f docker-compose-common.yml -f docker-compose-blue.yml build
          docker-compose -f docker-compose-common.yml -f docker-compose-blue.yml run --rm blue-backend sh -c "python manage.py test"

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Docker Compose 설치
      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      # 3. Blue 환경 배포
      - name: Deploy Blue Environment
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: postgresql
          DB_PORT: 5432
          REDIS_HOST: redis
          REDIS_PORT: 6379
        run: |
          # 1. 프라이빗 키를 임시 파일로 저장
          echo "${{ secrets.EC2_KEY }}" > /tmp/ec2_key.pem
          chmod 400 /tmp/ec2_key.pem

          # 2. SSH로 EC2 서버에 접속
          ssh -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/ubuntu/Backend
            docker-compose -f docker-compose-common.yml -f docker-compose-blue.yml down --volumes --remove-orphans || true
            docker-compose -f docker-compose-common.yml -f docker-compose-blue.yml up -d --build
          EOF

          # 3. 임시 파일 삭제
          rm -f /tmp/ec2_key.pem

