services:
    postgresql:
        image: postgres:latest
        restart: always
        container_name: postgresql
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: "${DB_NAME}"
            POSTGRES_USER: "${DB_USER}"
            POSTGRES_PASSWORD: "${DB_PASSWORD}"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - app_network

    redis:
        image: redis:latest
        container_name: redis
        restart: always
        ports:
            - "6379:6379"
        networks:
            - app_network

    rabbitmq:
        image: rabbitmq:3-management
        container_name: rabbitmq
        ports:
            - "15672:15672" #api 포트
            - "5672:5672" #amqp 포트
            - "15692:15692" #metrics 포트
        restart: always # 연결 끊어질시 다시 시작용
        tty: true # 끊어짐 방지
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
        networks:
            - app_network

    nginx:
        image: nginx:latest
        container_name: nginx
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf
            - /etc/letsencrypt:/etc/letsencrypt
        ports:
            - "80:80"
            - "443:443"
        networks:
            - app_network
        labels:
            logging: "promtail" #라벨링
            logging_jobname: "containerlogs" #그라파나에서 사용될 로그 job 이름 태그.
        depends_on:
            - blue-backend

    loki:
        image: grafana/loki:2.0.0
        container_name: loki
        ports:
            - "3100:3100"
        command: -config.file=/etc/loki/config.yml
        networks:
            - app_network

    promtail:
        image: grafana/promtail:latest
        container_name: promtail
        volumes:
            - ./promtail/config.yaml:/etc/promtail/docker-config.yaml
            - /var/lib/docker/containers:/var/lib/docker/containers:ro #도커 로그
            - /var/run/docker.sock:/var/run/docker.sock #도커 소켓 (디몬)
        command:
            - -config.file=/etc/promtail/docker-config.yaml #설정파일
        depends_on:
            - loki


volumes:
  postgres_data:


networks:
  app_network:
    driver: bridge