services:
    postgresql:
        image: postgres:latest
        restart: always
        container_name: postgresql
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: "${DB_NAME}"
            POSTGRES_USER: "${DB_USER}"
            POSTGRES_PASSWORD: "${DB_PASSWORD}"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - app_network

    redis:
        image: redis:latest
        container_name: redis
        restart: always
        ports:
            - "6379:6379"
        networks:
            - app_network

    rabbitmq:
        image: rabbitmq:3-management
        container_name: rabbitmq
        ports:
            - "15672:15672" #api 포트
            - "5672:5672" #amqp 포트
            - "15692:15692" #metrics 포트
        restart: always # 연결 끊어질시 다시 시작용
        tty: true # 끊어짐 방지
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
        networks:
            - app_network

    nginx:
        image: nginx:latest
        container_name: nginx
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf
            - /etc/letsencrypt:/etc/letsencrypt
        ports:
            - "80:80"
            - "443:443"
        networks:
            - app_network
        depends_on:
            - blue-backend


volumes:
  postgres_data:
  grafana-data:

networks:
  app_network:
    driver: bridge