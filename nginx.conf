user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
        worker_connections 768;
        # multi_accept on;
}

http {

        ##
        # Basic Settings
        ##

        sendfile on;
        tcp_nopush on;
        types_hash_max_size 2048;
        # server_tokens off;

        # server_names_hash_bucket_size 64;
        # server_name_in_redirect off;

        include mime.types;
        default_type application/octet-stream;

        ##
        # SSL Settings
        ##

        ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
        ssl_prefer_server_ciphers on;

        ##
        # Logging Settings
        ##

        #access_log /home/ubuntu/Backend/access.log;
        #error_log /home/ubuntu/Backend/error.log;

        ##
        # Gzip Settings
        ##

        gzip on;
        upstream blue-backend {
                                server blue-backend:8000;
                        }

        server {
                listen 80;
                server_name ailibi.click www.ailibi.click;

                return 301 https://$host$request_uri;

        }

        server {
            	listen 443 ssl;
            	server_name ailibi.click www.ailibi.click;
		
		allow 61.255.193.43;
		allow 220.126.218.152;
		allow 117.110.131.169;
		allow 61.252.111.110;
		allow 182.227.220.96;
		allow 117.16.196.170;
		deny all;
        
        	ssl_certificate /etc/letsencrypt/live/ailibi.click/fullchain.pem;
        	ssl_certificate_key /etc/letsencrypt/live/ailibi.click/privkey.pem;
		include /etc/letsencrypt/options-ssl-nginx.conf;
        	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location ~* \.(env|json|log|yml)$ {
        deny all;
        return 403;  # 403 Forbidden 응답
    }

        location / {
                proxy_pass http://blue-backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                }

        location /swagger/ {
                proxy_pass http://blue-backend/swagger;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                }

        location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
            }
        }


        # gzip_vary on;
        # gzip_proxied any;
        # gzip_comp_level 6;
        # gzip_buffers 16 8k;
        # gzip_http_version 1.1;
        # gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        ##
        # Virtual Host Configs
        ##


        include /etc/nginx/sites-enabled/*;
}


