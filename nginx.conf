user www-data;
worker_processes auto;
pid /run/nginx.pid;
#error_log /home/ubuntu/Backend/error.log;
include /etc/nginx/modules-enabled/*.conf;




events {
        worker_connections 768;
        # multi_accept on;
}

http {
        #log_format logger-json escape=json '{"source": "nginx", "time": $msec, "resp_body_size": $body_bytes_sent, "host": "$http_host", "remote_user": "$remote_user", "address": "$remote_addr", "request_length": $request_length, "method": "$request_method", "uri": "$request_uri", "status": $status, "user_agent": "$http_user_agent", "resp_time": $request_time, "upstream_addr": "$upstream_addr"}';
        # 로그 분석 하기 쉽게 로그를 json형식으로 수정

        #access_log /home/ubuntu/Backend/access.log;

        ##
        # Basic Settings
        ##

        sendfile on;
        tcp_nopush on;
        types_hash_max_size 2048;
        # server_tokens off;

        # server_names_hash_bucket_size 64;
        # server_name_in_redirect off;

        include mime.types;
        default_type application/octet-stream;

        ##
        # SSL Settings
        ##

        ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
        ssl_prefer_server_ciphers on;

        ##
        # Logging Settings
        ##

        #access_log /home/ubuntu/Backend/access.log;
        #error_log /home/ubuntu/Backend/error.log;

        ##
        # Gzip Settings
        ##

        gzip on;
        upstream blue-backend {
                                server blue-backend:8000;
                        }

        server {
                listen 80;
                server_name ailibi.click www.ailibi.click;

                return 301 https://$host$request_uri;

        }

        server {
            	listen 443 ssl;
            	server_name ailibi.click www.ailibi.click;

                ssl_certificate /etc/letsencrypt/live/ailibi.click/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/ailibi.click/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location ~* \.(env|json|log|yml)$ {
            deny all;
            return 403;  # 403 Forbidden 응답
            }

        location / {
            proxy_pass http://blue-backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            }

        location /swagger/ {
            proxy_pass http://blue-backend/swagger;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            proxy_pass http://blue-backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 추가적인 WebSocket 관련 설정
            proxy_ssl_certificate /etc/letsencrypt/live/ailibi.click/fullchain.pem;
            proxy_ssl_certificate_key /etc/letsencrypt/live/ailibi.click/privkey.pem;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_ssl_ciphers HIGH:!aNULL:!MD5;
            }

        # Grafana
        location /grafana/ {
            proxy_pass https://localhost:4000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /stub_status { #/stub_status로 메트릭 노출
            stub_status; # 메트릭 설정 키워드
            allow 127.0.0.1; # 로컬 호스트 엑세스 허용
            allow 172.18.0.0/16; # 도커 컨테이너들 엑세스 허용 (nginx-prometheus-exporter가 메트릭을 수집 할수있게 해주는 역할)
        }

        # gzip_vary on;
        # gzip_proxied any;
        # gzip_comp_level 6;
        # gzip_buffers 16 8k;
        # gzip_http_version 1.1;
        # gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        ##
        # Virtual Host Configs
        ##


        include /etc/nginx/sites-enabled/*;
}
}

